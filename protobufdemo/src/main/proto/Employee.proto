syntax = "proto3";//proto version that we're using
package com.learn;
import "Department.proto";
import "google/protobuf/timestamp.proto";

message Employee{

  //MEMO:: these numbers 1,2,3 are field tags to serialize and deserialize the data
  int32 id = 1;
  string name = 2;
  double salary = 3;
  repeated Department departments = 4;
  map<string,string> addressMap = 5;
  bool isActive = 6;
  bytes profilePicture = 7;
  google.protobuf.Timestamp joiningDate = 8;

}